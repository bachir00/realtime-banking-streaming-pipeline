apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    uid: banking-postgres
    url: postgres:5432
    database: banking_db
    user: postgres
    secureJsonData:
      password: password
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1300
      timescaledb: false
    isDefault: true
    editable: true
